name: 'Test and Lint Frontend'
description: 'Runs type checking, linting, and unit tests for the frontend'
inputs:
  frontend-dir:
    description: 'Directory containing the frontend code'
    required: true
    default: './vue'
  lint-enabled:
    description: 'Whether to run linting'
    required: false
    default: 'true'
runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'yarn'
        cache-dependency-path: '${{ inputs.frontend-dir }}/yarn.lock'
    
    - name: Install dependencies
      working-directory: ${{ inputs.frontend-dir }}
      shell: bash
      run: yarn install --frozen-lockfile
    
    - name: Run type check
      working-directory: ${{ inputs.frontend-dir }}
      shell: bash
      run: yarn type-check
    
    - name: Lint project
      if: ${{ inputs.lint-enabled == 'true' }}
      working-directory: ${{ inputs.frontend-dir }}
      shell: bash
      run: yarn lint
    
    - name: Run unit tests
      working-directory: ${{ inputs.frontend-dir }}
      shell: bash
      run: yarn test:ci
