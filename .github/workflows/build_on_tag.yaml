name: Build on Tag and Deploy Staging
on:
  push:
    tags: [v*]
env:
  FRONTEND_DIR: ./vue
  LINT_ENABLED: true
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [staging]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      
      - name: Test and Lint
        uses: ./.github/actions/test-and-lint
        with:
          frontend-dir: ${{ env.FRONTEND_DIR }}
          lint-enabled: ${{ env.LINT_ENABLED }}
      
      - name: Login to DockerHub 
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build with Dockerfile
        run: bash ./build-frontend.sh ${{ github.ref_name }} staging
